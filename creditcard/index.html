<form id="payment-form">
  
  <div class="card-back">
    <div class="stripe"></div>
    <div class="cvc-group">
      <label for="cvc">CVC/CVV</label>
      <input type="text" id="cvc" placeholder="xxx">
    </div>
  </div>

  <div class="card-front">
    <div class="total">TOTAL: $199</div>
    <div class="chip">💳</div>

    <div class="card-number">
      <label for="cardNumber">CARD NUMBER</label>
      <input type="text" id="cardNumber" placeholder="1234 5678 9101 1020">
    </div>

    <div class="card-name">
      <label for="cardHolder">CARD HOLDER</label>
      <input type="text" id="cardHolder" placeholder="Bailey K">
    </div>

    <div id="cardExpiration">
      <label id="expirationDate">EXPIRATION</label>
      <div class="exp-inputs">
        <input type="text" id="month" name="expMonth" placeholder="MM" aria-labelledby="expirationDate">
        <input type="text" id="year" name="expYear" placeholder="YY" aria-labelledby="expirationDate">
      </div>
    </div>
  </div>

  <button type="submit" class="submit-btn">Submit</button>
  
</form>
